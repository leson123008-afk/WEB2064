<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>

    <!-- favicon (optional) -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1047/1047462.png">
</head>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
    }

    .product-item {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
    }

    .product-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
    }
</style>

<body>
    <h2>Cà phê máy</h2>
    <div class="grid" id="productList"></div>

    <script>
        let products = [
            {
                name: "Latte Almond",
                price: "59.000đ",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHxJLcgec5KC6uws4odDHeqqEb5NOhlE_VPQ&s"
            },
            {
                name: "Latte Caramel",
                price: "59.000đ",
                image: "https://images.unsplash.com/photo-1511920170033-f8396924c348"
            },
            {
                name: "Latte Hazelnut",
                price: "59.000đ",
                image: "https://images.unsplash.com/photo-1509042239860-f550ce710b93"
            },
            {
                name: "Latte Coconut",
                price: "59.000đ",
                image: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"
            },
            {
                name: "Latte Bạc Xỉu",
                price: "49.000đ",
                image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735"
            },
            {
                name: "Latte Classic",
                price: "55.000đ",
                image: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb"
            }
        ];

        function renderList(arr) {
            let productList = document.getElementById("productList");
            productList.innerHTML = "";

            arr.forEach(product => {
                let card = document.createElement("div");
                card.className = "product-item";

                let img = document.createElement("img");
                img.src = product.image;

                let name = document.createElement("h3");
                name.textContent = product.name;

                let price = document.createElement("p");
                price.textContent = product.price;

                card.appendChild(img);
                card.appendChild(name);
                card.appendChild(price);

                productList.appendChild(card);
            });
        }

        renderList(products);
    </script>
</body>

</html>
