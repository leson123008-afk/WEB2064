<!DOCTYPE html>
<html>
<head>
    <title>TicTacToe Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        table {
            margin: auto;
        }

        button {
            width: 80px;
            height: 80px;
            font-size: 24px;
            background: #ddd;
            border: 1px solid #999;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h2>TICTACTOE GAME</h2>

<table>
    <tr>
        <td><button onclick="mark(0)"></button></td>
        <td><button onclick="mark(1)"></button></td>
        <td><button onclick="mark(2)"></button></td>
    </tr>
    <tr>
        <td><button onclick="mark(3)"></button></td>
        <td><button onclick="mark(4)"></button></td>
        <td><button onclick="mark(5)"></button></td>
    </tr>
    <tr>
        <td><button onclick="mark(6)"></button></td>
        <td><button onclick="mark(7)"></button></td>
        <td><button onclick="mark(8)"></button></td>
    </tr>
</table>

<script>
    // true = X, false = O
    var flag = true;
    var count = 0;

    function mark(index) {
        var buttons = document.getElementsByTagName("button");
        var button = buttons[index];

        if (flag) {
            button.innerText = "X";
            button.style.backgroundColor = "aqua";
        } else {
            button.innerText = "O";
            button.style.backgroundColor = "yellow";
        }

        button.setAttribute("disabled", true);

        flag = !flag;
        count++;

        // Nếu click đủ 8 lần thì kết thúc
        if (count == 9) {
            alert("Game over!");
            location.reload();
        }
    }
</script>

</body>
</html>
